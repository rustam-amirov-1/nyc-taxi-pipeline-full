version: 2

models:
  - name: stg_trips
    description: "Silver layer — cleaned and type-casted NYC Taxi trip records from raw.taxi_trips."
    columns:
      - name: vendor_id
        description: "Taxi vendor code. 1 = Creative Mobile Technologies, 2 = VeriFone Inc."
        tests:
          - not_null
          - accepted_values:
              values: [1, 2]
      - name: ratecode_id
        description: "Rate code. 1=Standard, 2=JFK, 3=Newark, 4=Nassau/Westchester, 5=Negotiated."
        tests:
          - not_null
      - name: pickup_datetime
        description: "Timestamp when the passenger was picked up."
        tests:
          - not_null
      - name: dropoff_datetime
        description: "Timestamp when the passenger was dropped off."
        tests:
          - not_null
      - name: pickup_longitude
        description: "Longitude coordinate of the pickup location."
      - name: pickup_latitude
        description: "Latitude coordinate of the pickup location."
      - name: dropoff_longitude
        description: "Longitude coordinate of the dropoff location."
      - name: dropoff_latitude
        description: "Latitude coordinate of the dropoff location."
      - name: passenger_count
        description: "Number of passengers in the trip."
        tests:
          - not_null
      - name: trip_distance
        description: "Trip distance in miles."
        tests:
          - not_null
      - name: fare_amount
        description: "Base fare amount calculated by the meter."
        tests:
          - not_null
      - name: extra
        description: "Extra charges such as rush hour or overnight surcharge."
      - name: mta_tax
        description: "MTA tax surcharge."
      - name: tip_amount
        description: "Tip amount given to the driver."
      - name: tolls_amount
        description: "Total tolls paid during the trip."
      - name: improvement_surcharge
        description: "Improvement surcharge assessed on hailed trips."
      - name: total_amount
        description: "Total amount charged to the passenger."
        tests:
          - not_null
      - name: payment_type
        description: "Payment method. 1=Credit Card, 2=Cash, 3=No Charge, 4=Dispute, 5=Unknown."
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
      - name: store_and_fwd_flag
        description: "Whether the trip record was stored before sending to server. Y=Yes, N=No."
      - name: trip_type
        description: "Trip distance category. short_trip=≤3 miles, medium_trip=≤8 miles, long_trip=>8 miles."
        tests:
          - not_null
          - accepted_values:
              values: ['short_trip', 'medium_trip', 'long_trip']
      - name: trip_duration_minutes
        description: "Duration of the trip in minutes, calculated from pickup to dropoff."
        tests:
          - not_null
      - name: time_of_day
        description: "Time of day based on pickup time. morning=6-11, afternoon=12-17, evening=18-22, night=other."
        tests:
          - not_null